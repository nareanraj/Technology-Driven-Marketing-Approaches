<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Securely access the TechMarketing ecosystem.">
    <title>Secure Access - TechMarketing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="premium-bg">
    <!-- Navbar (simplified for login) -->
    <nav class="navbar" style="background-color: transparent; border: none;">
        <div class="container">
            <a href="index.html" class="logo">Tech<span>Marketing</span></a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link-anime">Home</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-wrapper">
        <div id="login-particles"></div>
        <div class="login-card glass-panel tilt-element">
            <div class="login-header">
                <p class="accent-text-luxury" style="color: var(--accent) !important; text-align: center; margin-bottom: 0.5rem;">Secure Access</p>
                <h2 class="text-gradient">Human Intelligence</h2>
                <p>Verify your presence to enter the marketing ecosystem.</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="email" required autocomplete="off" placeholder=" ">
                    <label for="email">Ecosystem ID (Email)</label>
                    <div class="input-glow"></div>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Authentication Key</label>
                    <div class="input-glow"></div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Persist Connection
                    </label>
                    <a href="#" class="forgot-password">Lost Key?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-login btn-click">Synchronize Session</button>
            </form>
            
            <div class="login-footer">
                <p>Unregistered? <a href="register.html" class="text-gradient">Join the Network</a></p>
            </div>
        </div>
    </div>

    <script>
        // Simple Particle Background for Login
        const particleContainer = document.getElementById('login-particles');
        for (let i = 0; i < 40; i++) {
            let p = document.createElement('div');
            p.classList.add('particle');
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
            p.style.setProperty('--ty', (Math.random() - 0.5) * 300 + 'px');
            p.style.animationDelay = Math.random() * 8 + 's';
            particleContainer.appendChild(p);
        }

        // Vanilla Tilt Enhanced
        const card = document.querySelector('.login-card');
        card.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -8;
            const rotateY = ((x - centerX) / centerX) * 8;
            card.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
        card.addEventListener('mouseleave', () => {
            card.style.transform = `perspective(1200px) rotateX(0deg) rotateY(0deg)`;
        });

        // Form Submit
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.querySelector('.btn-login');
            btn.textContent = "Authenticating Bio-ID...";
            setTimeout(() => {
                window.location.href = 'settings.html';
            }, 1200);
        });
    </script>
</body>
</html>
